name: Build & Deploy to Firebase Hosting

on:
  workflow_dispatch:
  repository_dispatch:
    types: [drive-update]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: publishing-platform/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: publishing-platform

      # Decode the base64-encoded Service Account JSON into a file.
      # Store the encoded string as GitHub Secret: GOOGLE_CREDENTIALS_BASE64
      # Generate it locally with: base64 -w 0 your-service-account.json
      - name: Decode Google Service Account credentials
        run: |
          echo "${{ secrets.GOOGLE_CREDENTIALS_BASE64 }}" | base64 -d > publishing-platform/google-credentials.json

      - name: Build Next.js static export
        run: npm run build
        working-directory: publishing-platform
        env:
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}

      - name: Remove credentials file before deploy
        run: rm -f publishing-platform/google-credentials.json

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          entryPoint: publishing-platform
